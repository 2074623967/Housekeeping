server:
  port: 18130

spring:
  application:
    name: home-service-settlement-backend
  datasource:
    url: jdbc:h2:mem:settlement_system;MODE=MySQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
