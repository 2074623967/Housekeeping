server:
  port: 8080

spring:
  application:
    name: home-service-payment-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${HSP_DB_URL:jdbc:mysql://127.0.0.1:3306/housekeeping_payment_core?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true}
    username: ${HSP_DB_USERNAME:root}
    password: ${HSP_DB_PASSWORD:}
  sql:
    init:
      mode: always
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:/mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

payment:
  callback:
    # 模拟环境关闭，真实渠道接入环境必须打开并注入独立密钥。
    require-signature: ${HSP_PAYMENT_CALLBACK_REQUIRE_SIGNATURE:false}
    secret: ${HSP_PAYMENT_CALLBACK_SECRET:}
    allowed-skew-seconds: ${HSP_PAYMENT_CALLBACK_ALLOWED_SKEW_SECONDS:300}
    nonce-ttl-seconds: ${HSP_PAYMENT_CALLBACK_NONCE_TTL_SECONDS:600}
  expiry-close:
    fixed-delay-ms: ${HSP_PAYMENT_EXPIRY_CLOSE_DELAY_MS:60000}
  event-retry:
    fixed-delay-ms: ${HSP_PAYMENT_EVENT_RETRY_DELAY_MS:300000}
  refund-retry:
    fixed-delay-ms: ${HSP_PAYMENT_REFUND_RETRY_DELAY_MS:300000}
